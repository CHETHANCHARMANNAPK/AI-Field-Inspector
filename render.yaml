services:
  - type: web
    name: ai-field-inspector
    runtime: python
    buildCommand: bash build.sh
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11"
      - key: NODE_VERSION
        value: "18"
      - key: GOOGLE_API_KEY
        sync: false
      - key: LLM_PROVIDER
        value: gemini
